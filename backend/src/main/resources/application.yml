server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/bloodbank_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: bloodbank
    password: Blood@1234
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

jwt:
  secret: HemoVaultSuperSecretKeyForJWTSigningMustBe256BitsLongAtLeast2024
  expiration: 86400000

bloodbank:
  shortage:
    check-interval-ms: 3600000
  expiry:
    warning-days: 7
  prediction:
    window-days: 30

google:
  gemini:
    api:
      key: AIzaSyAyhgHnNtp7MwHR4iWgQ4IPE92deXwOe2w
    model: gemini-2.0-flash

logging:
  level:
    com.hemovault: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
